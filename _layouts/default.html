  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      // Find all Jekyll-generated code blocks marked as language-mermaid
      const mermaidBlocks = document.querySelectorAll("pre code.language-mermaid, pre.mermaid, code.mermaid");
      
      mermaidBlocks.forEach(function (block, index) {
        // Create a secure raw div container for Mermaid to read
        const div = document.createElement("div");
        div.className = "mermaid";
        div.id = "mermaid-diagram-" + index;
        div.textContent = block.textContent;
        
        // Replace the unrendered code elements with our clean div block
        const parent = block.closest("pre") || block;
        parent.parentNode.replaceChild(div, parent);
      });

      // Initialize the engine safely after parsing elements
      mermaid.initialize({
        startOnLoad: true,
        theme: "neutral"
      });
    });
  </script>
